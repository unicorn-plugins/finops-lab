version: "1.0.0"
created_date: "2026-04-19"
organization: "HBT (주)하이브리지텔레콤"
source_data: "out/focus-normalized.csv (2,335 행)"
covers_principle: "COVERS-O, COVERS-R, COVERS-S"
description: |
  HBT 멀티클라우드 환경의 태그 정책.
  필수 4종 태그(Project, Environment, Owner, CostCenter)와
  AI 특화 3종 태그(LLMApiKey, ModelName, ChargebackUnit)를 정의.
  위반 시 자동 알림, 리소스 격리, 비용 차단 조치 수행.

required_tags:
  # ──────────────────────────────────────────────────────────────────
  # 1. Project (프로젝트 식별)
  # ──────────────────────────────────────────────────────────────────
  - key: "Project"
    type: "string"
    required: true
    description: "리소스가 속한 프로젝트 코드 (web, api, data, ml)"
    allowed_values:
      - "web"       # Web 프로덕션 서비스 (ECS Fargate, CloudFront, S3, RDS Aurora)
      - "api"       # API 프로덕션 서비스 (ECS Fargate, API Gateway, Lambda, ElastiCache)
      - "data"      # Data 파이프라인 (EMR, Redshift, Glue, S3, Kinesis, BigQuery)
      - "ml"        # ML/AI 파이프라인 (Vertex AI, Bedrock, SageMaker)
    format_rule: "^[a-z]+$"
    format_description: "소문자 영문만 허용 (예: web, api, data, ml)"
    coverage_target: "96% 이상"
    current_coverage: "96.45%"
    missing_cost_kwh: "207,431 KRW"
    violation_action:
      - type: "notify"
        channel: "slack"
        destination: "#finops-review"
        template: |
          [Project 태그 미적용] 리소스 {{resourceId}}
          CSP: {{provider}}, 서비스: {{service}}
          72시간 내 태그 적용 필수. 미수정 시 비용 차단.
        escalation_hours: 72
      - type: "isolate"
        description: "리소스 격리 (비운영 상태로 변경, 다른 환경 접근 차단)"
        trigger_after_hours: 72
      - type: "cost_block"
        description: "비용 차단 (리소스 종료, 예약 인스턴스 환불 처리)"
        trigger_after_hours: 168

  # ──────────────────────────────────────────────────────────────────
  # 2. Environment (운영 환경)
  # ──────────────────────────────────────────────────────────────────
  - key: "Environment"
    type: "string"
    required: true
    description: "리소스 운영 환경 구분"
    allowed_values:
      - "prod"      # 프로덕션: 사용자 트래픽 처리
      - "stg"       # 스테이징: 상용 배포 전 검증
      - "staging"   # 스테이징 (대체 값)
      - "dev"       # 개발: 로컬 개발 및 테스트
      - "test"      # 테스트: CI/CD 테스트 환경
    format_rule: "^(prod|stg|staging|dev|test)$"
    format_description: "허용값 중 하나 (prod, stg, staging, dev, test)"
    coverage_target: "100%"
    current_coverage: "100.00%"
    missing_cost_kwh: "0 KRW"
    violation_action:
      - type: "notify"
        channel: "slack"
        destination: "#finops-review"
        template: |
          [Environment 태그 미적용] 리소스 {{resourceId}}
          CSP: {{provider}}, 서비스: {{service}}
          즉시 조치 필수.
        escalation_hours: 24
      - type: "isolate"
        description: "리소스 격리"
        trigger_after_hours: 24

  # ──────────────────────────────────────────────────────────────────
  # 3. Owner (비용 책임자)
  # ──────────────────────────────────────────────────────────────────
  - key: "Owner"
    type: "string"
    required: true
    description: "리소스 비용 책임자 이메일 (담당자@hbt.co.kr)"
    allowed_values:
      - "webteam@hbt.co.kr"
      - "apiteam@hbt.co.kr"
      - "datateam@hbt.co.kr"
      - "aiteam@hbt.co.kr"
      - "infrateam@hbt.co.kr"
      - "finopsteam@hbt.co.kr"
    format_rule: "^[a-zA-Z0-9._%+-]+@hbt\\.co\\.kr$"
    format_description: "이메일 형식 (예: owner@hbt.co.kr)"
    coverage_target: "98% 이상"
    current_coverage: "97.26%"
    missing_cost_kwh: "108,254 KRW"
    violation_action:
      - type: "notify"
        channel: "slack"
        destination: "#finops-review, @owner_mention"
        template: |
          [Owner 태그 미적용] 리소스 {{resourceId}}
          CSP: {{provider}}, 서비스: {{service}}
          72시간 내 Owner 지정 필수.
        escalation_hours: 72
      - type: "escalate"
        description: "FinOps팀 에스컬레이션 (이지수 팀장)"
        trigger_after_hours: 72

  # ──────────────────────────────────────────────────────────────────
  # 4. CostCenter (비용 센터 귀속)
  # ──────────────────────────────────────────────────────────────────
  - key: "CostCenter"
    type: "string"
    required: true
    description: "리소스 비용 센터 코드 (조직 단위 비용 추적)"
    allowed_values:
      - "CC-100"    # 인프라/운영팀 (공통 인프라, 네트워킹, 보안)
      - "CC-200"    # 서비스개발팀 (Web, API 프로덕션 서비스)
      - "CC-300"    # 데이터/AI팀 (Data 파이프라인, ML 워크로드)
    format_rule: "^CC-[0-9]{3}$"
    format_description: "CC-NNN 형식 (예: CC-100, CC-200, CC-300)"
    coverage_target: "98% 이상"
    current_coverage: "95.76%"
    missing_cost_kwh: "735,271 KRW"
    violation_action:
      - type: "notify"
        channel: "slack"
        destination: "#finops-review"
        template: |
          [CostCenter 태그 누락] 리소스 {{resourceId}}
          CSP: {{provider}}, 서비스: {{service}}
          비용 귀속 불가. 72시간 내 CC-100/200/300 지정 필수.
        escalation_hours: 72
      - type: "hold_cost"
        description: "비용 임시 보류 (미귀속 비용 분리 처리)"
        trigger_after_hours: 72
      - type: "escalate"
        description: "CostCenter 오너에게 알림 (CC-100/200/300 담당자)"
        trigger_after_hours: 72

# ──────────────────────────────────────────────────────────────────
# AI 특화 태그 (신규, FinOps for AI)
# ──────────────────────────────────────────────────────────────────
ai_tags:
  description: |
    AI/LLM 워크로드의 비용 추적 및 관리를 위한 추가 태그.
    LLM API Key 추적, 모델명 식별, chargeback 단위 지정.

  - key: "LLMApiKey"
    type: "string"
    required_for: "AI 리소스 (Bedrock, OpenAI API, Vertex AI, Anthropic)"
    description: "LLM API Key 식별자 (마스킹, 마지막 4자리만 표시)"
    format_rule: "^[a-zA-Z0-9]*[a-zA-Z0-9]{4}$"
    format_description: "마스킹 형식 (예: sk-...abcd, gsk-...1234)"
    example_values:
      - "sk-...abcd"    # OpenAI API
      - "gsk-...5678"   # Google Gemini
      - "ant-...9999"   # Anthropic Claude
    current_coverage: "0%"
    affected_resources: 2
    affected_cost_kwh: "843,695 KRW"
    violation_action:
      - type: "notify"
        channel: "slack"
        destination: "#finops-review, @aiteam"
        template: |
          [LLMApiKey 태그 미적용] AI 리소스 {{resourceId}}
          서비스: {{serviceName}}, 비용: {{cost}} KRW
          API Key 마스킹 태그 추가 필수.
        escalation_hours: 48

  - key: "ModelName"
    type: "string"
    required_for: "AI 리소스 (LLM 추론, 파인튜닝)"
    description: "사용 모델명 식별 (비용 추적 및 최적화 근거)"
    format_rule: "^[a-zA-Z0-9_-]+$"
    format_description: "모델명 (공급사-모델-버전 형식, 예: gpt-4o)"
    example_values:
      - "openai-gpt-4o"             # OpenAI GPT-4 Omni
      - "openai-gpt-4-turbo"        # OpenAI GPT-4 Turbo
      - "openai-gpt-3-5-turbo"      # OpenAI GPT-3.5 Turbo
      - "google-vertex-ai-gemini"   # Google Vertex AI Gemini
      - "google-vertex-ai-claude-3" # Google + Anthropic (전략적 제휴)
      - "anthropic-claude-3-opus"   # Anthropic Claude 3 Opus
      - "anthropic-claude-3-5-sonnet" # Anthropic Claude 3.5 Sonnet
      - "anthropic-claude-3-haiku"  # Anthropic Claude 3 Haiku
    current_coverage: "0%"
    affected_resources: 2
    affected_cost_kwh: "843,695 KRW"
    violation_action:
      - type: "notify"
        channel: "slack"
        destination: "#finops-review, @aiteam"
        template: |
          [ModelName 태그 미적용] AI 리소스 {{resourceId}}
          서비스: {{serviceName}}, 비용: {{cost}} KRW
          사용 모델명 명시 필수 (예: gpt-4o, claude-3-5-sonnet).
        escalation_hours: 48

  - key: "ChargebackUnit"
    type: "string"
    required_for: "AI 리소스 (chargeback 정책 적용 리소스)"
    description: "AI 비용 청구 단위 (팀/프로젝트/비즈니스유닛)"
    format_rule: "^(CC-[0-9]{3}|team-[a-z]+|project-[a-z]+)$"
    format_description: "CostCenter, 팀명, 또는 프로젝트명"
    example_values:
      - "CC-300"          # 데이터/AI팀 전체 청구
      - "team-ml"         # ML 팀 청구
      - "project-rag"     # RAG(검색증강생성) 프로젝트 청구
      - "project-finetuning" # 파인튜닝 프로젝트 청구
    current_coverage: "0%"
    affected_resources: 2
    affected_cost_kwh: "843,695 KRW"
    rationale: |
      AI 비용은 토큰 단가 변동 및 모델 다운그레이드의 영향을 받기 쉬움.
      ChargebackUnit으로 세분화하면 각 팀/프로젝트의
      비용 효율성을 독립적으로 추적 가능.
    violation_action:
      - type: "notify"
        channel: "slack"
        destination: "#finops-review, @aiteam"
        template: |
          [ChargebackUnit 태그 미적용] AI 리소스 {{resourceId}}
          서비스: {{serviceName}}, 비용: {{cost}} KRW
          청구 단위 지정 필수 (예: CC-300, team-ml, project-rag).
        escalation_hours: 48

# ──────────────────────────────────────────────────────────────────
# CSP별 태그 적용 가이드
# ──────────────────────────────────────────────────────────────────
csp_application_guide:

  aws:
    name: "Amazon Web Services"
    tag_key_format: "Name: <value>"
    tag_methods:
      - name: "Tag on Resource (콘솔)"
        description: "EC2, RDS, S3 등 리소스별로 개별 태깅"
        complexity: "Low"
        automation_level: "Manual"
        guidance: |
          1. AWS 콘솔 → 리소스 선택
          2. Tags 탭 → Add tags
          3. Project, Environment, Owner, CostCenter 순서로 입력

      - name: "AWS CloudFormation Tags"
        description: "IaC 기반 배포 시 템플릿에 태그 정의"
        complexity: "Medium"
        automation_level: "Automated"
        guidance: |
          CloudFormation 템플릿에 Parameters 섹션 추가:
          Properties:
            Tags:
              - Key: Project
                Value: !Ref ProjectName
              - Key: Environment
                Value: !Ref EnvironmentName

      - name: "AWS Tag Editor"
        description: "다중 리소스 대량 태깅"
        complexity: "Low"
        automation_level: "Semi-Automated"
        guidance: |
          1. Resource Groups → Tag Editor
          2. Region, Resource Type 선택
          3. Manage tags → Add tags

      - name: "AWS Cost Allocation Tags"
        description: "CostCenter, Project 태그는 비용 할당 태그로 활성화"
        complexity: "Low"
        automation_level: "Manual (1회)"
        guidance: |
          1. Billing & Cost Management → Cost Allocation Tags
          2. User-Defined Tags 섹션에서 Activate
          3. 활성화 후 24시간 후 Cost Explorer에 반영

  azure:
    name: "Microsoft Azure"
    tag_key_format: "key:value"
    tag_methods:
      - name: "Azure Portal Resource Tags"
        description: "Azure Portal에서 개별 리소스에 태그 적용"
        complexity: "Low"
        automation_level: "Manual"
        guidance: |
          1. Azure Portal → 리소스 선택
          2. Tags 섹션 → Edit
          3. Project, Environment, Owner, CostCenter 입력

      - name: "Azure Resource Manager (ARM) Templates"
        description: "IaC 기반 배포 시 템플릿에 태그 정의"
        complexity: "Medium"
        automation_level: "Automated"
        guidance: |
          ARM 템플릿 tags 섹션:
          "tags": {
            "Project": "[parameters('projectName')]",
            "Environment": "[parameters('environmentName')]"
          }

      - name: "Azure Policy (정책 기반 태깅)"
        description: "배포 자동화 시 필수 태그 강제"
        complexity: "High"
        automation_level: "Automated"
        guidance: |
          1. Azure Policy → Create Policy
          2. Effect: Deny (태그 없으면 배포 거부)
          3. 또는 Effect: Modify (자동 태그 추가)

      - name: "Azure Cost Management + Billing"
        description: "Cost Center 태그를 구독 또는 리소스 그룹 수준에 적용"
        complexity: "Low"
        automation_level: "Semi-Automated"
        guidance: |
          1. Billing Scopes → Subscriptions
          2. Cost Management → Budgets에서 태그 기반 예산 설정

  gcp:
    name: "Google Cloud Platform"
    tag_key_format: "key=value (labels)"
    tag_methods:
      - name: "GCP Console Labels"
        description: "GCP 리소스의 labels 탭에서 개별 태깅"
        complexity: "Low"
        automation_level: "Manual"
        guidance: |
          1. GCP Console → 리소스 선택 (Compute Engine, Cloud Storage 등)
          2. Labels 탭 → Add Label
          3. Key-Value 쌍 입력

      - name: "Terraform (Infrastructure as Code)"
        description: "Terraform 코드로 GCP 리소스 배포 시 labels 정의"
        complexity: "Medium"
        automation_level: "Automated"
        guidance: |
          resource "google_compute_instance" "web_server" {
            labels = {
              project     = "web"
              environment = "prod"
              owner       = "webteam"
              cost_center = "cc-200"
            }
          }

      - name: "gcloud CLI"
        description: "명령줄로 대량 태깅"
        complexity: "Medium"
        automation_level: "Automated"
        guidance: |
          gcloud compute instances add-labels INSTANCE_NAME \
            --labels=project=web,environment=prod \
            --zone=asia-northeast1-a

      - name: "GCP Billing Labels"
        description: "CostCenter 등 특정 태그를 청구 라벨로 활성화"
        complexity: "Low"
        automation_level: "Manual (1회)"
        guidance: |
          1. Billing → Cost Management → Billing Labels
          2. Enable labels for cost allocation
          3. Cloud Billing Reports에서 label별 비용 추적

  anthropic:
    name: "Anthropic (SaaS LLM Service)"
    tag_key_format: "API metadata (request headers)"
    tag_methods:
      - name: "Anthropic API Request Headers"
        description: "API 호출 시 custom headers로 메타데이터 전송"
        complexity: "Medium"
        automation_level: "Automated"
        guidance: |
          HTTP 헤더로 전송:
          X-HBT-Project: web
          X-HBT-Environment: prod
          X-HBT-Owner: webteam@hbt.co.kr
          X-HBT-CostCenter: CC-200
          X-HBT-ModelName: claude-3-5-sonnet
          X-HBT-ChargebackUnit: CC-300

      - name: "Anthropic Usage Metadata"
        description: "Anthropic 콘솔에서 월간 사용 요약에 메타데이터 기록"
        complexity: "Low"
        automation_level: "Manual"
        guidance: |
          1. Anthropic Console → Usage
          2. 월간 비용 항목마다 Project, CostCenter 메모 기록
          3. 또는 CSV export 후 로컬 데이터베이스와 조인

      - name: "Internal Billing System Integration"
        description: "HBT 내부 청구 시스템에 Anthropic 비용 매핑"
        complexity: "High"
        automation_level: "Automated"
        guidance: |
          Anthropic 월별 비용 → FinOps팀 → CostCenter별 매핑
          (현재: CC-300 데이터/AI팀이 일괄 담당, 향후 세분화 예정)

# ──────────────────────────────────────────────────────────────────
# 태그 적용 자동화 (tag-governor 에이전트)
# ──────────────────────────────────────────────────────────────────
automation:
  tag_governor_agent:
    name: "tag-governor (김태규)"
    frequency: "일 1회 (04:00 KST)"
    tasks:
      - name: "미태깅 리소스 탐지"
        action: "CSP별 API 호출로 필수 4종 태그 미적용 리소스 목록 생성"
        tools: "AWS TagAPI, Azure ResourceAPI, GCP Compute API"
        output: "missing-tags-{date}.csv"

      - name: "태그 형식 검증"
        action: "Owner 이메일, CostCenter 코드 형식 검증"
        tools: "regex validation, 정규식 검사"
        output: "malformed-tags-{date}.csv"

      - name: "Slack 알림 발송"
        action: "72시간 미수정 리소스에 대해 Owner 및 FinOps팀에 알림"
        template: |
          [태그 거버넌스 알림] 리소스 미태깅
          리소스 ID: {{resourceId}}
          CSP: {{provider}}, 서비스: {{service}}
          누락 태그: {{missingTags}}
          비용: {{cost}} KRW

          72시간 내 조치 필수.
          미수정 시 리소스 격리 및 비용 차단 진행.
        escalation_channel: "#finops-review"
        escalation_owner: "이지수 (FinOps팀장)"

      - name: "월간 커버리지 리포트"
        action: "CostCenter별, 환경별 태그 커버리지 계산 및 보고"
        frequency: "월 1회 (매월 25일)"
        output: "tag-coverage-{month}.md"
        recipients: "이지수, 박민준, 각 CostCenter 담당자"

      - name: "이상 비용 탐지 연계"
        action: "미태깅 리소스의 비용 급증 시 자동 알림"
        trigger: "MoM 비용 증가 20% 이상 (태그 없는 리소스만)"
        action_detail: "Owner 지정 후 원인 분석"

# ──────────────────────────────────────────────────────────────────
# 정책 시행 일정 및 유예 기간
# ──────────────────────────────────────────────────────────────────
enforcement_schedule:

  phase_1_awareness:
    duration: "2026-04-19 ~ 2026-04-30 (12일)"
    description: "정책 공지 및 교육"
    actions:
      - "tag-policy.yaml 배포"
      - "태그 거버넌스 교육 웨비나 개최 (FinOps팀)"
      - "CSP별 태깅 가이드 문서 공유"
    compliance_requirement: "0% (정보성)"

  phase_2_audit:
    duration: "2026-05-01 ~ 2026-05-31 (31일)"
    description: "현황 진단 및 자동 스캔"
    actions:
