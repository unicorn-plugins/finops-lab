# finops 플러그인 — 추상 → 구체 매핑
# 플러그인 생성 시점 최신 모델 기준. setup 스킬에서 사용자 확인 후 갱신.

tier_mapping:
  default:
    HEAVY:
      model: "claude-opus-4-7"
    HIGH:
      model: "claude-opus-4-7"
    MEDIUM:
      model: "claude-sonnet-4-6"
    LOW:
      model: "claude-haiku-4-5"

tool_mapping:
  # ── 이미지 생성 ── (@ppt-writer 슬라이드 일러스트)
  image_generate:
    - type: custom
      source: "tools/generate_image.py"
      tools: ["generate_image"]

  # ── builtin 도구는 런타임이 내장 처리하므로 명시 매핑하지 않음 ──
  # file_read, file_write, code_execute 등은 Read/Write/Edit/Bash로 자동 해석

action_mapping:
  file_write: ["Write", "Edit"]
  file_delete: ["Bash"]
  code_execute: ["Bash"]
  network_access: ["WebFetch", "WebSearch"]
  user_interact: ["AskUserQuestion"]
  agent_delegate: ["Task"]
